- name: Install Starship.rs using brew
  community.general.homebrew:
    name: "starship"
    state: latest
    update_homebrew: yes
  ignore_errors: yes
  # when: ansible_facts['os_family'] == "Darwin"

- name: Configure Starship.rs
  copy:
    src: "starship.toml"
    dest: "{{ home_dir }}/.config/starship.toml"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: u=rw,g=r,o=r
